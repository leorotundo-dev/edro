name: "Edro CodeQL Config"

# Exclude js/missing-rate-limiting: Fastify's built-in { config: { rateLimit: {} } }
# is not recognised by CodeQL's Express-centric rate-limit sanitizer, causing
# hundreds of false-positive alerts on routes that already have framework-level
# throttling and are protected by authentication guards.
query-filters:
  - exclude:
      id: js/missing-rate-limiting
  - exclude:
      id: js/request-forgery

paths-ignore:
  - "docs/**"
  - "apps/web/public/ux/**"
  - "apps/publisher/**"
  - "legacy/**"
