name: Run Production Migrations

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Motivo da execucao manual
        type: string
        required: false

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Load Railway target
        id: railway
        shell: bash
        run: |
          PROJECT_ID="$(node -p 'require("./.railway/config.json").projectId')"
          ENVIRONMENT="$(node -p 'require("./.railway/config.json").environment')"
          echo "project_id=${PROJECT_ID}" >> "$GITHUB_OUTPUT"
          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate Railway token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        shell: bash
        run: |
          if [ -z "${RAILWAY_TOKEN}" ]; then
            echo "Secret RAILWAY_TOKEN nao configurado." >&2
            exit 1
          fi

      - name: Run backend migrations against production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        shell: bash
        run: |
          railway ssh \
            --service edro-backend \
            --project "${{ steps.railway.outputs.project_id }}" \
            --environment "${{ steps.railway.outputs.environment }}" \
            sh -lc "cd /app && pnpm --filter @edro/backend db:migrate"
