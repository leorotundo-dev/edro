name: Security Gates

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security verification gates
        run: pnpm security:verify

      - name: Run unit tests
        run: pnpm test

      - name: Lint
        run: pnpm --filter @edro/web lint && pnpm --filter @edro/web-freelancer lint && pnpm --filter @edro/web-cliente lint
